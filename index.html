<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>오늘의 단어 — 한글 자모 워들</title>
<style>
  :root{
    --bg:#1a1a1a; --surface:#2b2b2b; --surface2:#363636; --text:#f0f0f0; --muted:#9a9a9a;
    --border:#3a3a3a; --green:#639922; --yellow:#EF9F27; --gray:#5f5e5a; --blue:#185FA5;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding:20px 12px; user-select:none;
  }
  h1{font-size:22px; font-weight:500; margin:6px 0 2px;}
  .sub{font-size:13px; color:var(--muted); margin:0 0 18px;}
  #board{display:flex; flex-direction:column; gap:6px; align-items:center; margin-bottom:12px;}
  .row{display:flex; gap:6px;}
  .cell{
    width:50px; height:50px; display:flex; align-items:center; justify-content:center;
    font-size:23px; font-weight:500; border-radius:8px;
    background:var(--surface); border:1px solid var(--border);
  }
  .cell.empty{background:transparent;}
  .cell.active{border-color:var(--muted); border-width:1.5px;}
  .cell.g{background:var(--green); color:#fff; border:none;}
  .cell.y{background:var(--yellow); color:#412402; border:none;}
  .cell.b{background:var(--gray); color:#fff; border:none;}
  #preview{font-size:18px; min-height:26px; margin:2px 0 4px; letter-spacing:2px;}
  #msg{font-size:14px; color:var(--muted); min-height:20px; margin:2px 0 12px; text-align:center;}
  .keyboard{display:flex; flex-direction:column; gap:7px; align-items:center; width:100%; max-width:360px;}
  .krow{display:flex; gap:5px; justify-content:center; width:100%;}
  .key{
    flex:1; max-width:38px; padding:12px 0; text-align:center; font-size:16px; font-weight:500;
    background:var(--surface2); border:none; border-radius:7px; color:var(--text); cursor:pointer;
  }
  .key:active{background:#454545;}
  .key.g{background:var(--green); color:#fff;}
  .key.y{background:var(--yellow); color:#412402;}
  .key.b{background:var(--gray); color:#fff;}
  .key.wide{flex:1.3; max-width:none; font-size:14px;}
  .key.enter{background:var(--green); color:#fff;}
  .key.reset{background:var(--blue); color:#fff;}
  .ad-banner{
    width:100vw; max-width:480px; margin:28px auto 8px; overflow:hidden;
    border-top:1px solid var(--border); border-bottom:1px solid var(--border);
    padding:10px 0; position:relative;
  }
  .ad-label{
    text-align:center; font-size:11px; color:#666; letter-spacing:1px;
    margin-bottom:8px; text-transform:uppercase;
  }
  .ad-track{
    display:flex; gap:12px; width:max-content;
    animation:ad-scroll 18s linear infinite;
  }
  .ad-banner:hover .ad-track{ animation-play-state:paused; }
  .ad-track img{
    height:120px; border-radius:8px; object-fit:cover; display:block;
  }
  @keyframes ad-scroll{
    from{ transform:translateX(0); }
    to{ transform:translateX(-50%); }
  }
</style>
</head>
<body>
  <h1>오늘의 단어</h1>
  <p class="sub">자판을 눌러 단어를 맞혀보세요</p>
  <div id="board"></div>
  <div id="preview"></div>
  <p id="msg"></p>
  <div class="keyboard" id="keyboard"></div>

  <div class="ad-banner" aria-label="사진 배너">
    <div class="ad-label">추억 갤러리</div>
    <div class="ad-track">
      <img src="banner1.jpg" alt="" />
      <img src="banner2.jpg" alt="" />
      <img src="banner3.jpg" alt="" />
      <img src="banner1.jpg" alt="" aria-hidden="true" />
      <img src="banner2.jpg" alt="" aria-hidden="true" />
      <img src="banner3.jpg" alt="" aria-hidden="true" />
    </div>
  </div>

<script>
/* =======================================================================
   정답 단어 설정  ★ 모든 정답은 자모 분리 시 정확히 5개여야 합니다 ★
   -----------------------------------------------------------------------
   - WORDS_B64 배열에 정답 후보를 Base64로 넣어둡니다.
     페이지를 열 때마다 이 중 하나가 무작위로 정답이 됩니다.
   - 정답을 추가/변경하려면 브라우저 콘솔에서
        btoa(unescape(encodeURIComponent("새단어")))
     를 실행해 나온 문자열을 배열에 추가하세요.
   - 자모가 5개가 아닌 단어는 아래 코드에서 자동으로 걸러집니다.
     (콘솔에 경고가 찍히니 개발자도구에서 확인 가능)
   - 자모 수 빠르게 확인하려면 콘솔에서  countJamo("단어")  를 쓰세요.
   ======================================================================= */
const WORDS_B64 = [
  "7IKs656M","6rWs66aE","7IKs656R","67CU656M","66eI7J2M","6rCA7Iq0","6rKo7Jq4",
  "7Jes66aE","7ZWY64qY","67CU7JyE","6rCA7JyE","6rWQ7ZqM","7J2Y66as","64W4656Y",
  "7Iuc6rOE","66qo656Y","7J2Y7J6Q","7Jqw7IKw","7IiY67CV","7Zi467CV","6rCA67Cp",
  "64aN6rWs","7Iuc6rCE","66eI7J2E","6rCA7J2E","7IKs7Iq0","6rGw67aB","6rCc66+4",
  "66ek66+4","6rOg656Y","7IOB7Ja0","66m47LmY","6rCI7LmY","66y47Ja0","7IOI7Jqw",
  "6rCA7J6s","7KGw6rCc","66+47Jet","652866m0","66eM65GQ","6rmA7LmY","66eI64qY",
  "7JaR7YyM","7J6l66+4","66qo656A","7IiY6rWt","64Kc7LSI","66eI64u5","7Jqw66y8",
  "67aA7JeM","6rGw7Iuk","64uk6529","7KeA67aV","6riw65Gl","67O164+E","7Iuc7J6l",
  "67aA7IKw","7ISc7Jq4","7KCc7KO8","66+46rWt","7Yag64G8","7Y+t7Y+s","7IKs66eJ",
  "7Y+J7JW8","7KeA7KeE","6rCA662E","7ZmN7IiY","6rWs7Iqs","6rWQ7Iuk","7Lmc6rWs",
  "7J6Q66ek","7IKs7LSM","7IaQ64WA","7IaQ7J6Q","7IKs7JyE","6rGw7Jq4","7IiY6rG0",
  "6re466aH","7KCR7Iuc","6rWt7J6Q","64uo7LaU","66y066aO","66eI7Iig","66+47Iig",
  "7IiY7ZWZ","6rWt7Ja0","64+E642V","7Jet7IKs","7Jm47Yis","7KCQ7Y28","7Jqw67CV",
  "64W47J2E","7KCV7Jik","7KCA64WB","67O066aE","6re466+Q","7LaU7ISd","64uo7Jik",
  "64+Z7KeA","6rOh7Jqw","67mE7JyE","7J207J2R"
];
const WORD_LEN = 5;     // 모든 정답의 자모 개수 (고정)
const MAX_TRIES = 5;
/* ======================================================================= */

function b64decode(b){ return decodeURIComponent(escape(atob(b))); }
const WORDS = WORDS_B64.map(b64decode);

const CHO  = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const JUNG = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
const JONG = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

/* 복합 모음 → 단모음 분리. 예: ㅟ → ㅜ+ㅣ, ㅘ → ㅗ+ㅏ */
const V_SPLIT = {
  "ㅐ":["ㅏ","ㅣ"], "ㅒ":["ㅑ","ㅣ"], "ㅔ":["ㅓ","ㅣ"], "ㅖ":["ㅕ","ㅣ"],
  "ㅘ":["ㅗ","ㅏ"], "ㅙ":["ㅗ","ㅏ","ㅣ"], "ㅚ":["ㅗ","ㅣ"],
  "ㅝ":["ㅜ","ㅓ"], "ㅞ":["ㅜ","ㅓ","ㅣ"], "ㅟ":["ㅜ","ㅣ"], "ㅢ":["ㅡ","ㅣ"]
};
/* 겹받침/쌍자음 → 기본 자모 분리 */
const C_SPLIT = {
  "ㄲ":["ㄱ","ㄱ"],"ㄸ":["ㄷ","ㄷ"],"ㅃ":["ㅂ","ㅂ"],"ㅆ":["ㅅ","ㅅ"],"ㅉ":["ㅈ","ㅈ"],
  "ㄳ":["ㄱ","ㅅ"],"ㄵ":["ㄴ","ㅈ"],"ㄶ":["ㄴ","ㅎ"],"ㄺ":["ㄹ","ㄱ"],"ㄻ":["ㄹ","ㅁ"],
  "ㄼ":["ㄹ","ㅂ"],"ㄽ":["ㄹ","ㅅ"],"ㄾ":["ㄹ","ㅌ"],"ㄿ":["ㄹ","ㅍ"],"ㅀ":["ㄹ","ㅎ"],"ㅄ":["ㅂ","ㅅ"]
};
const splitV = v => V_SPLIT[v] || [v];
const splitC = c => C_SPLIT[c] || [c];

function decompose(str){
  const out=[];
  for(const ch of str){
    const code = ch.charCodeAt(0) - 0xAC00;
    if(code < 0 || code > 11171){ out.push(ch); continue; }
    splitC(CHO[Math.floor(code/588)]).forEach(j=>out.push(j));
    splitV(JUNG[Math.floor((code%588)/28)]).forEach(j=>out.push(j));
    const jong = code%28;
    if(jong>0) splitC(JONG[jong]).forEach(j=>out.push(j));
  }
  return out;
}

const CHO_SET=new Set(CHO), JUNG_SET=new Set(JUNG);
const JONG_IDX={"":0,"ㄱ":1,"ㄲ":2,"ㄳ":3,"ㄴ":4,"ㄵ":5,"ㄶ":6,"ㄷ":7,"ㄹ":8,"ㄺ":9,"ㄻ":10,"ㄼ":11,"ㄽ":12,"ㄾ":13,"ㄿ":14,"ㅀ":15,"ㅁ":16,"ㅂ":17,"ㅄ":18,"ㅅ":19,"ㅆ":20,"ㅇ":21,"ㅈ":22,"ㅊ":23,"ㅋ":24,"ㅌ":25,"ㅍ":26,"ㅎ":27};
/* 단모음 두 개 → 복합모음으로 재결합 (분리해서 입력한 걸 글자로 되돌림) */
const V_MERGE={"ㅗㅏ":"ㅘ","ㅗㅐ":"ㅙ","ㅗㅣ":"ㅚ","ㅜㅓ":"ㅝ","ㅜㅔ":"ㅞ","ㅜㅣ":"ㅟ","ㅡㅣ":"ㅢ","ㅏㅣ":"ㅐ","ㅑㅣ":"ㅒ","ㅓㅣ":"ㅔ","ㅕㅣ":"ㅖ"};

/* 중성 위치에서 모음을 읽되, 가능하면 복합모음으로 합침 */
function readVowel(jamos, i){
  if(!JUNG_SET.has(jamos[i])) return null;
  if(i+1<jamos.length && JUNG_SET.has(jamos[i+1])){
    const merged=V_MERGE[jamos[i]+jamos[i+1]];
    if(merged) return {vowel:merged, used:2};
  }
  return {vowel:jamos[i], used:1};
}

/* 자모 배열을 글자 단위로 파싱. 올바른 한글이면 글자 배열, 아니면 null */
function parseGlyphs(jamos){
  const glyphs=[]; let i=0;
  while(i<jamos.length){
    const a=jamos[i];
    if(!CHO_SET.has(a)) return null;            // 글자는 자음(초성)으로 시작해야 함
    const v=readVowel(jamos, i+1);
    if(!v) return null;                          // 초성 뒤에 모음이 없음
    let pos=i+1+v.used, jong="";
    if(pos<jamos.length && CHO_SET.has(jamos[pos])){
      const nextIsVowel=(pos+1<jamos.length)&&JUNG_SET.has(jamos[pos+1]);
      if(!nextIsVowel && (jamos[pos] in JONG_IDX)){ jong=jamos[pos]; pos+=1; }
    }
    glyphs.push({cho:a, jung:v.vowel, jong});
    i=pos;
  }
  return glyphs;
}
function glyphsToStr(g){
  return g.map(x=>String.fromCharCode(0xAC00 + CHO.indexOf(x.cho)*588 + JUNG.indexOf(x.jung)*28 + (JONG_IDX[x.jong]||0))).join("");
}

/* 입력 자모가 완전한 한글 단어로 조합되는지 검증 */
function isValidWord(jamos){ return parseGlyphs(jamos)!==null; }

/* 화면 미리보기용 조합 (조합 불가 부분은 자모 그대로 표시) */
function compose(jamos){
  const g=parseGlyphs(jamos);
  if(g) return glyphsToStr(g);
  let result="", i=0;
  while(i<jamos.length){
    if(CHO_SET.has(jamos[i])){
      const v=readVowel(jamos, i+1);
      if(v){ result+=glyphsToStr([{cho:jamos[i], jung:v.vowel, jong:""}]); i+=1+v.used; continue; }
    }
    result+=jamos[i]; i++;
  }
  return result;
}

/* 자모 개수 확인용 (콘솔에서 countJamo("단어") 사용 가능) */
function countJamo(w){ return decompose(w).length; }
window.countJamo = countJamo;

/* 정확히 WORD_LEN(5)개 자모인 단어만 정답 후보로 사용 */
const VALID_WORDS = WORDS.filter(w => decompose(w).length === WORD_LEN);
const REJECTED = WORDS.filter(w => decompose(w).length !== WORD_LEN);
if(REJECTED.length){
  console.warn(`[경고] 자모 ${WORD_LEN}개가 아니어서 제외된 단어: ` +
    REJECTED.map(w => `${w}(${decompose(w).length}개)`).join(", "));
}
if(VALID_WORDS.length === 0){
  throw new Error(`정답 후보가 없습니다. WORDS_B64에 자모 ${WORD_LEN}개짜리 단어를 넣어주세요.`);
}
const ANSWER = VALID_WORDS[Math.floor(Math.random() * VALID_WORDS.length)];

const TARGET = decompose(ANSWER);
const LEN = TARGET.length;
const board=document.getElementById("board");
const preview=document.getElementById("preview");
const msg=document.getElementById("msg");
const kb=document.getElementById("keyboard");

let rows=[], current=[], done=false, keyState={};

function renderRow(jamos, marks, isActive){
  const row=document.createElement("div");
  row.className="row";
  for(let i=0;i<LEN;i++){
    const cell=document.createElement("div");
    let cls="cell";
    if(marks) cls+=" "+marks[i];
    else if(!jamos || !jamos[i]) cls+=" empty";
    if(isActive && i===current.length) cls+=" active";
    cell.className=cls;
    cell.textContent = jamos && jamos[i] ? jamos[i] : "";
    row.appendChild(cell);
  }
  board.appendChild(row);
}
function refresh(){
  board.innerHTML="";
  rows.forEach(r=>renderRow(r.jamos,r.marks,false));
  if(!done && rows.length<MAX_TRIES) renderRow(current.slice(),null,true);
  for(let k=rows.length+(done?0:1);k<MAX_TRIES;k++) renderRow(null,null,false);
  preview.textContent = current.length ? compose(current) : "";
}
function score(guess){
  const marks=new Array(LEN).fill("b");
  const pool={};
  for(const t of TARGET) pool[t]=(pool[t]||0)+1;
  for(let i=0;i<LEN;i++){ if(guess[i]===TARGET[i]){ marks[i]="g"; pool[TARGET[i]]--; } }
  for(let i=0;i<LEN;i++){
    if(marks[i]==="g") continue;
    if(pool[guess[i]]>0){ marks[i]="y"; pool[guess[i]]--; }
  }
  return marks;
}
const rank = m => m==="g"?3:m==="y"?2:1;
function press(j){
  if(done) return;
  if(current.length>=LEN){ msg.textContent="칸이 가득 찼어요. 제출하거나 지우세요."; return; }
  current.push(j); msg.textContent=""; refresh();
}
function backspace(){ if(done||!current.length) return; current.pop(); refresh(); }
function reset(){
  rows=[]; current=[]; done=false; keyState={};
  msg.textContent="다시 도전하세요! (정답은 그대로예요)";
  buildKeyboard(); refresh();
}
function submit(){
  if(done) return;
  if(current.length!==LEN){ msg.textContent=`자모 ${LEN}개를 모두 채워주세요 (지금 ${current.length}개).`; return; }
  if(!isValidWord(current)){ msg.textContent="올바른 단어가 아니에요. 글자가 완성되는지 확인해 주세요."; return; }
  const guess=current.slice();
  const marks=score(guess);
  rows.push({jamos:guess,marks});
  for(let i=0;i<LEN;i++){
    const j=guess[i], m=marks[i];
    if(!keyState[j] || rank(m)>rank(keyState[j])) keyState[j]=m;
  }
  current=[];
  if(marks.every(m=>m==="g")){ done=true; msg.textContent="정답입니다! 🎉"; }
  else if(rows.length>=MAX_TRIES){ done=true; msg.textContent="기회 소진! '초기화'를 눌러 다시 도전하세요."; }
  else { msg.textContent=`${MAX_TRIES-rows.length}번 남았어요.`; }
  buildKeyboard(); refresh();
}

/* 복합 모음 키 제거 — 단모음만 남김 */
const KB_LAYOUT=[
  ["ㅂ","ㅈ","ㄷ","ㄱ","ㅅ","ㅛ","ㅕ","ㅑ"],
  ["ㅁ","ㄴ","ㅇ","ㄹ","ㅎ","ㅗ","ㅓ","ㅏ","ㅣ"],
  ["ㅋ","ㅌ","ㅊ","ㅍ","ㅠ","ㅜ","ㅡ"]
];
function buildKeyboard(){
  kb.innerHTML="";
  KB_LAYOUT.forEach(rowKeys=>{
    const row=document.createElement("div");
    row.className="krow";
    rowKeys.forEach(j=>{
      const k=document.createElement("button");
      k.className="key"+(keyState[j]?" "+keyState[j]:"");
      k.textContent=j;
      k.addEventListener("click",()=>press(j));
      row.appendChild(k);
    });
    kb.appendChild(row);
  });
  const frow=document.createElement("div");
  frow.className="krow";
  const del=document.createElement("button");
  del.className="key wide"; del.textContent="⌫ 지우기";
  del.addEventListener("click",backspace);
  const rst=document.createElement("button");
  rst.className="key wide reset"; rst.textContent="초기화";
  rst.addEventListener("click",reset);
  const ent=document.createElement("button");
  ent.className="key wide enter"; ent.textContent="제출";
  ent.addEventListener("click",submit);
  frow.appendChild(del); frow.appendChild(rst); frow.appendChild(ent);
  kb.appendChild(frow);
}

document.addEventListener("keydown",function(e){
  if(e.key==="Backspace"){ e.preventDefault(); backspace(); }
  else if(e.key==="Enter"){ submit(); }
});

refresh();
buildKeyboard();
</script>
</body>
</html>
