<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>오늘의 단어 — 한글 자모 워들</title>
<style>
  :root{
    --bg:#1a1a1a; --surface:#2b2b2b; --surface2:#363636; --text:#f0f0f0; --muted:#9a9a9a;
    --border:#3a3a3a; --green:#639922; --yellow:#EF9F27; --gray:#5f5e5a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding:20px 12px; user-select:none;
  }
  h1{font-size:22px; font-weight:500; margin:6px 0 2px;}
  .sub{font-size:13px; color:var(--muted); margin:0 0 18px;}
  #board{display:flex; flex-direction:column; gap:6px; align-items:center; margin-bottom:14px;}
  .row{display:flex; gap:6px;}
  .cell{
    width:52px; height:52px; display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:500; border-radius:8px;
    background:var(--surface); border:1px solid var(--border);
  }
  .cell.empty{background:transparent;}
  .cell.active{border-color:var(--muted);}
  .cell.g{background:var(--green); color:#fff; border:none;}
  .cell.y{background:var(--yellow); color:#412402; border:none;}
  .cell.b{background:var(--gray); color:#fff; border:none;}
  #preview{font-size:18px; min-height:26px; margin:2px 0 4px; letter-spacing:2px; color:var(--text);}
  #msg{font-size:14px; color:var(--muted); min-height:20px; margin:2px 0 10px; text-align:center;}
  .keyboard{display:flex; flex-direction:column; gap:7px; align-items:center; width:100%; max-width:360px;}
  .krow{display:flex; gap:6px; justify-content:center; width:100%;}
  .key{
    flex:1; max-width:40px; padding:12px 0; text-align:center; font-size:17px; font-weight:500;
    background:var(--surface2); border:none; border-radius:7px; color:var(--text); cursor:pointer;
  }
  .key:active{background:#454545;}
  .key.g{background:var(--green); color:#fff;}
  .key.y{background:var(--yellow); color:#412402;}
  .key.b{background:var(--gray); color:#fff;}
  .key.wide{flex:1.6; max-width:none; font-size:14px;}
  .key.enter{background:var(--green); color:#fff;}
</style>
</head>
<body>
  <h1>오늘의 단어</h1>
  <p class="sub">자판을 눌러 단어를 맞혀보세요</p>
  <div id="board"></div>
  <div id="preview"></div>
  <p id="msg"></p>
  <div class="keyboard" id="keyboard"></div>

<script>
/* =======================================================
   여기만 바꾸면 됩니다 — 정답 단어 설정
   ======================================================= */
const ANSWER = "이응";   // 원하는 정답 단어로 변경
const MAX_TRIES = 5;     // 기회 횟수
/* ======================================================= */

const CHO  = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const JUNG = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
const JONG = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const CHO_SET = new Set(CHO);
const JUNG_SET = new Set(JUNG);

function decompose(str){
  const out=[];
  for(const ch of str){
    const code = ch.charCodeAt(0) - 0xAC00;
    if(code < 0 || code > 11171){ out.push(ch); continue; }
    out.push(CHO[Math.floor(code/588)]);
    out.push(JUNG[Math.floor((code%588)/28)]);
    const jong = code%28;
    if(jong>0) for(const j of JONG[jong]) out.push(j);
  }
  return out;
}

function compose(jamos){
  let result="";
  let i=0;
  while(i<jamos.length){
    const a=jamos[i];
    if(CHO_SET.has(a) && i+1<jamos.length && JUNG_SET.has(jamos[i+1])){
      const cho=CHO.indexOf(a);
      const jung=JUNG.indexOf(jamos[i+1]);
      let jong=0, used=2;
      if(i+2<jamos.length && !JUNG_SET.has(jamos[i+2])){
        const jIdx=JONG.indexOf(jamos[i+2]);
        const nextIsJung = (i+3<jamos.length) && JUNG_SET.has(jamos[i+3]);
        if(jIdx>0 && !nextIsJung){ jong=jIdx; used=3; }
      }
      result += String.fromCharCode(0xAC00 + cho*588 + jung*28 + jong);
      i+=used;
    } else {
      result += a; i++;
    }
  }
  return result;
}

const TARGET = decompose(ANSWER);
const LEN = TARGET.length;
const board = document.getElementById("board");
const preview = document.getElementById("preview");
const msg = document.getElementById("msg");
const kb = document.getElementById("keyboard");

let rows = [];
let current = [];
let done = false;
const keyState = {};

function renderRow(jamos, marks, isActive){
  const row=document.createElement("div");
  row.className="row";
  for(let i=0;i<LEN;i++){
    const cell=document.createElement("div");
    let cls="cell";
    if(marks) cls+=" "+marks[i];
    else if(!jamos || !jamos[i]) cls+=" empty";
    if(isActive && i===current.length) cls+=" active";
    cell.className=cls;
    cell.textContent = jamos && jamos[i] ? jamos[i] : "";
    row.appendChild(cell);
  }
  board.appendChild(row);
}
function refresh(){
  board.innerHTML="";
  rows.forEach(r=>renderRow(r.jamos,r.marks,false));
  if(!done && rows.length<MAX_TRIES){
    renderRow(current.slice(),null,true);
  }
  for(let k=rows.length+(done?0:1);k<MAX_TRIES;k++) renderRow(null,null,false);
  preview.textContent = current.length ? compose(current) : "";
}
function score(guess){
  const marks=new Array(LEN).fill("b");
  const pool={};
  for(const t of TARGET) pool[t]=(pool[t]||0)+1;
  for(let i=0;i<LEN;i++){ if(guess[i]===TARGET[i]){ marks[i]="g"; pool[TARGET[i]]--; } }
  for(let i=0;i<LEN;i++){
    if(marks[i]==="g") continue;
    if(pool[guess[i]]>0){ marks[i]="y"; pool[guess[i]]--; }
  }
  return marks;
}
function rank(m){ return m==="g"?3:m==="y"?2:1; }
function updateKeys(jamos,marks){
  for(let i=0;i<LEN;i++){
    const j=jamos[i], m=marks[i];
    if(!keyState[j] || rank(m)>rank(keyState[j])) keyState[j]=m;
  }
  buildKeyboard();
}
function pressJamo(j){
  if(done) return;
  if(current.length>=LEN){ msg.textContent="칸이 가득 찼어요. 제출하거나 지우세요."; return; }
  current.push(j);
  msg.textContent="";
  refresh();
}
function backspace(){
  if(done || current.length===0) return;
  current.pop();
  refresh();
}
function submit(){
  if(done) return;
  if(current.length!==LEN){ msg.textContent="자모 "+LEN+"개를 모두 채워주세요 (지금 "+current.length+"개)."; return; }
  const guess=current.slice();
  const marks=score(guess);
  rows.push({jamos:guess,marks});
  updateKeys(guess,marks);
  current=[];
  if(marks.every(m=>m==="g")){ done=true; msg.textContent="정답입니다! 🎉"; }
  else if(rows.length>=MAX_TRIES){ done=true; msg.textContent='기회 소진! 정답은 "'+ANSWER+'" 였어요.'; }
  else { msg.textContent=(MAX_TRIES-rows.length)+"번 남았어요."; }
  refresh();
}

const KB_LAYOUT=[
  ["ㅂ","ㅈ","ㄷ","ㄱ","ㅅ","ㅛ","ㅕ","ㅑ","ㅐ","ㅔ"],
  ["ㅁ","ㄴ","ㅇ","ㄹ","ㅎ","ㅗ","ㅓ","ㅏ","ㅣ"],
  ["ㅋ","ㅌ","ㅊ","ㅍ","ㅠ","ㅜ","ㅡ"]
];
function buildKeyboard(){
  kb.innerHTML="";
  KB_LAYOUT.forEach(rowKeys=>{
    const row=document.createElement("div");
    row.className="krow";
    rowKeys.forEach(j=>{
      const k=document.createElement("button");
      k.className="key"+(keyState[j]?" "+keyState[j]:"");
      k.textContent=j;
      k.addEventListener("click",()=>pressJamo(j));
      row.appendChild(k);
    });
    kb.appendChild(row);
  });
  const frow=document.createElement("div");
  frow.className="krow";
  const del=document.createElement("button");
  del.className="key wide"; del.textContent="⌫ 지우기";
  del.addEventListener("click",backspace);
  const ent=document.createElement("button");
  ent.className="key wide enter"; ent.textContent="제출";
  ent.addEventListener("click",submit);
  frow.appendChild(del); frow.appendChild(ent);
  kb.appendChild(frow);
}

document.addEventListener("keydown",function(e){
  if(e.key==="Backspace"){ e.preventDefault(); backspace(); }
  else if(e.key==="Enter"){ submit(); }
});

refresh();
buildKeyboard();
</script>
</body>
</html>
